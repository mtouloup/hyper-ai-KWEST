apiVersion: v1
kind: ServiceAccount
metadata:
  name: logger-sa
  namespace: pod-schedule-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-schedule-logger
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-schedule-logger-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-schedule-logger
subjects:
  - kind: ServiceAccount
    name: logger-sa
    namespace: pod-schedule-logging
